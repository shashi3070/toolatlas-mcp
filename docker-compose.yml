version: "3.9"

services:
  toolatlas:
    build: .
    container_name: toolatlas
    ports:
      - "8081:8081"
    volumes:
      - toolatlas_data:/data
    environment:
      TOOLATLAS_HOST: "0.0.0.0"
      TOOLATLAS_PORT: "8081"
      TOOLATLAS_STORAGE_TYPE: "json"
      TOOLATLAS_DATABASE_URL: "sqlite+aiosqlite:////data/toolatlas.db"
      TOOLATLAS_LOG_LEVEL: "INFO"
    restart: unless-stopped

volumes:
  toolatlas_data:
